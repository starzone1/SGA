    <!-- Theme Initialization Script & Window Property Polyfill Shield -->
    <script>
      (function() {
        // Shield window.fetch from throwing TypeError when overwritten in iframe sandboxes
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { originalFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Unable to patch window.fetch getter/setter:', e);
        }

        try {
          var saved = localStorage.getItem('sga_theme');
          var isDark = saved === 'dark' || (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
